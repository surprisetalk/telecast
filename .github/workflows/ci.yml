name: CI
on:
  push:
  pull_request:

jobs:
  deno-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check functions/ scripts/
      - run: deno test functions/
      - run: deno check functions/ scripts/

  elm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes elm-format --validate src/ tests/
      - run: npx --yes elm-test
      - run: elm make src/Main.elm --output=/dev/null
