name: Refresh
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno run --allow-net --allow-env --allow-read --allow-sys scripts/refresh.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
