<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#faf7f0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0d" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg fill='%23ffa552' transform='translate(50,50)'%3E%3Ccircle r='10'/%3E%3Cpath d='M0-22a22 22 0 0 1 0 44' fill='none' stroke='%23ffa552' stroke-width='6'/%3E%3Cpath d='M0-38a38 38 0 0 1 0 76' fill='none' stroke='%23ffa552' stroke-width='6'/%3E%3C/g%3E%3C/svg%3E" />
    <meta property="og:title" content="Telecasts" />
    <meta property="og:description" content="A minimalist, free YouTube alternative. Subscribe to any RSS feed — podcasts, YouTube channels, blogs — and watch it all in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://telecast.company" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Telecasts" />
    <meta name="twitter:description" content="A minimalist, free YouTube alternative. Subscribe to any RSS feed — podcasts, YouTube channels, blogs — and watch it all in one place." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/style.css" />
    <script src="/elm.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const KEY = "LIBRARY";

      const defaultLibrary = {
        channels: {},
        episodes: {},
        history: {},
        settings: {},
      };

      // Load library before init so it's available for initial routing
      let library;
      try {
        library = JSON.parse(localStorage.getItem(KEY) || "null") ?? defaultLibrary;
      } catch (error) {
        console.error("Error loading initial library:", error);
        library = defaultLibrary;
      }

      const app = Elm.Main.init({
        node: document.getElementById("app"),
        flags: library,
      });

      app.ports.librarySaving.subscribe(library => {
        try {
          localStorage.setItem(KEY, JSON.stringify(library));
        } catch (error) {
          console.error("Error saving library:", error);
        }
      });
    </script>
  </body>
</html>
